name: "publish"

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  publish:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # 内部测试分发（M1/M2, aarch64）
            args: "--target aarch64-apple-darwin --bundles app --no-sign"
          - platform: "macos-latest" # 内部测试分发（Intel, x86_64）
            args: "--target x86_64-apple-darwin --bundles app --no-sign"
          - platform: "windows-latest" # 对于 Windows Intel/AMD (x64)
            args: "--target x86_64-pc-windows-msvc"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # 针对不同平台添加对应的 target
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || 'x86_64-pc-windows-msvc' }}

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libayatana-appindicator3-dev librsvg2-dev patchelf

      - name: install frontend dependencies
        run: npm install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # 这里会自动替换 package.json 中的版本号
          releaseName: "PDFMathTranslate Desktop v__VERSION__"
          releaseBody: "自动生成的全平台版本发布。"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
